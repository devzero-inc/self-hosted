vmType: "qemu"
cpus: 6
memory: "10GiB"
disk: "100GiB"
mounts: []
images:
  - location: "https://dz-self-hosted.s3.us-west-2.amazonaws.com/jammy-arm64-kernel-6.8.qcow2"
    arch: "aarch64"
  - location: "https://dz-self-hosted.s3.us-west-2.amazonaws.com/jammy-amd64-kernel-6.8.qcow2"
    arch: "x86_64"
provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # exit if kubectl is already installed on the system
      command -v kubectl  >/dev/null 2>&1 && exit 0

      export DEBIAN_FRONTEND=noninteractive

      case $(uname -m) in
        x86_64)
          arch=amd64
          ;;
        aarch64)
          arch=arm64
          ;;
      esac

      # install prerequisites
      hostnamectl set-hostname dz-cluster
      apt-get update -y 
      apt-get install iptables conntrack apt-transport-https gpg ca-certificates curl wget jq conmon -y
      install -m 0755 -d /etc/apt/keyrings

      # install minikube
      curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-${arch}
      install minikube-linux-${arch} /usr/local/bin/minikube && rm minikube-linux-${arch}
      ln -s minikube /usr/local/bin/kubectl
      ln -s /bin/false /usr/local/bin/docker # bug in "none" driver
      mkdir -p /etc/containerd && touch /etc/containerd/config.toml

      # install cri-tools
      VERSION="v1.29.0"
      curl -LO https://github.com/kubernetes-sigs/cri-tools/releases/download/$VERSION/crictl-$VERSION-linux-${arch}.tar.gz
      tar -xzvf crictl-$VERSION-linux-${arch}.tar.gz crictl
      install crictl /usr/local/bin/crictl && rm crictl-$VERSION-linux-${arch}.tar.gz crictl

      # setup cni-plugins
      mkdir -p /opt/cni && ln -s /usr/local/libexec/cni /opt/cni/bin
      chmod 755 /etc/cni /etc/cni/net.d && rm -f /etc/cni/net.d/*.conf*

      # setup cri-o
      mkdir /etc/crio/crio.conf.d
      touch /etc/crio/crio.conf.d/02-crio.conf

      # install helm
      curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      systemctl daemon-reload
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if [ -f cluster_provisioned ]; then
        exit 0
      fi

      minikube start --kubernetes-version=1.29 --driver=none --container-runtime=containerd --cni=bridge
      touch cluster_provisioned
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      case $(uname -m) in
        x86_64)
          arch=amd64
          ;;
        aarch64)
          arch=arm64
          ;;
      esac

      kubectl label nodes --all node-role.kubernetes.io/devpod-node=1
      kubectl label nodes --all sysbox-install=yes

      kubectl apply -f https://raw.githubusercontent.com/nestybox/sysbox/master/sysbox-k8s-manifests/sysbox-install.yaml

      # add fake gp2 storage class
      cat <<EOF > storage-class.yaml
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: gp2
        labels:
          addonmanager.kubernetes.io/mode: EnsureExists
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"
      provisioner: k8s.io/minikube-hostpath
      EOF

      # add generic device plugin
      cat <<EOF > generic-device-plugin.yaml
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: generic-device-plugin
        namespace: kube-system
        labels:
          app.kubernetes.io/name: generic-device-plugin
      spec:
        selector:
          matchLabels:
            app.kubernetes.io/name: generic-device-plugin
        template:
          metadata:
            labels:
              app.kubernetes.io/name: generic-device-plugin
          spec:
            priorityClassName: system-node-critical
            nodeSelector:
              node-role.kubernetes.io/devpod-node: "1"
            tolerations:
            - operator: "Exists"
              effect: "NoExecute"
            - operator: "Exists"
              effect: "NoSchedule"
            containers:
            - image: ghcr.io/squat/generic-device-plugin:${arch}-36bfc606bba2064de6ede0ff2764cbb52edff70d
              args:
              - --device
              - |
                name: tuntap
                groups:
                  - count: 999
                    paths:
                      - path: /dev/net/tun
              name: generic-device-plugin
              resources:
                requests:
                  cpu: 50m
                  memory: 10Mi
                limits:
                  cpu: 50m
                  memory: 20Mi
              ports:
              - containerPort: 8080
                name: http
              volumeMounts:
              - name: device-plugin
                mountPath: /var/lib/kubelet/device-plugins
              - name: dev
                mountPath: /dev
            volumes:
            - name: device-plugin
              hostPath:
                path: /var/lib/kubelet/device-plugins
            - name: dev
              hostPath:
                path: /dev
        updateStrategy:
          type: RollingUpdate
      EOF
probes:
  - script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 30s bash -c "until command -v kubectl >/dev/null 2>&1; do sleep 3; done"; then
        echo >&2 "kubectl is not installed yet"
        exit 1
      fi

      if ! timeout 300s bash -c "until test -f /etc/kubernetes/admin.conf; do sleep 3; done"; then
        echo >&2 "k8s is not running yet"
        exit 1
      fi

      if ! timeout 300s bash -c "until kubectl version >/dev/null 2>&1; do sleep 3; done"; then
        echo >&2 "kubernetes cluster is not up and running yet"
        exit 1
      fi
    hint: |
      See "/var/log/cloud-init-output.log". in the guest
  - script: |
      #!/bin/bash

      # Run kubectl get pods -A and store the output
      output=$(kubectl get pods -A)

      # Check if the output is empty
      if [ -z "$output" ]; then
        echo "No pods found!"
        exit 1
      fi

      # Check if Sysbox installation is completed
      if ! timeout 300s bash -c "until kubectl logs daemonset/sysbox-deploy-k8s -n kube-system | grep -q 'Sysbox installation completed'; do sleep 3; done"; then
        echo >&2 "Sysbox installation has not completed yet"
        exit 1
      fi

      # Check if any pod is not in Running status
      if echo "$output" | grep -v -E 'Running|STATUS'; then
        echo "One or more pods are not in Running status!"
        exit 1
      fi

      echo "All pods are in Running status."
      exit 0